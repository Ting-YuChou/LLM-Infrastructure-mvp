global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    cluster: 'llm-infrastructure-local'
    environment: 'local'

rule_files:
  - 'alerts.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - localhost:9090
        labels:
          service: 'prometheus'

  - job_name: 'vllm-server'
    static_configs:
      - targets:
          - 'vllm-server:8000'
        labels:
          service: 'vllm'
          namespace: 'llm-inference'
          pod: 'vllm-server-local'
          app: 'vllm'
