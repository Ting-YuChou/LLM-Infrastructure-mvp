groups:
  - name: llm-serving-reliability
    rules:
      - alert: LLMGatewayHighErrorRate
        expr: |
          sum(rate(llm_requests_total{status="error"}[5m]))
          /
          clamp_min(sum(rate(llm_requests_total[5m])), 1)
          > 0.05
        for: 10m
        labels:
          severity: page
          service: api-gateway
        annotations:
          summary: "LLM serving error rate is above 5%"
          description: "Gateway or backend errors are above the production serving budget."

      - alert: LLMHighTimeToFirstToken
        expr: histogram_quantile(0.95, sum(rate(llm_time_to_first_token_seconds_bucket[5m])) by (le, model)) > 2
        for: 10m
        labels:
          severity: warn
          service: serving
        annotations:
          summary: "LLM TTFT p95 is above 2 seconds"
          description: "Streaming time-to-first-token latency has exceeded the interactive serving target."

      - alert: LLMQueueBacklog
        expr: max(llm_request_queue_size) > 20
        for: 5m
        labels:
          severity: warn
          service: serving
        annotations:
          summary: "LLM request queue backlog is high"
          description: "The request queue is backing up and should trigger scale-out or admission control."

      - alert: LLMNoTrafficMetrics
        expr: absent(llm_requests_total)
        for: 5m
        labels:
          severity: warn
          service: monitoring
        annotations:
          summary: "LLM request metrics are missing"
          description: "Prometheus is not seeing llm_requests_total from the gateway or serving backend."

  - name: llm-serving-saturation
    rules:
      - alert: LLMRequestQueueSustained
        expr: avg by (namespace, pod) (llm_request_queue_size{namespace="llm-inference"}) > 10
        for: 2m
        labels:
          severity: warning
          service: serving
        annotations:
          summary: "vLLM request queue is sustained"
          description: "Pod {{ $labels.pod }} has had more than 10 queued requests for at least 2 minutes."

      - alert: LLMGPUUtilizationHigh
        expr: avg by (namespace, pod) (llm_gpu_utilization_percent{namespace="llm-inference"}) > 90
        for: 5m
        labels:
          severity: warning
          service: serving
        annotations:
          summary: "vLLM GPU utilization is high"
          description: "Pod {{ $labels.pod }} GPU utilization has been above 90% for at least 5 minutes."

      - alert: LLMHPAReplicaLimitReached
        expr: kube_horizontalpodautoscaler_status_current_replicas{namespace="llm-inference", horizontalpodautoscaler="vllm-hpa"} >= kube_horizontalpodautoscaler_spec_max_replicas{namespace="llm-inference", horizontalpodautoscaler="vllm-hpa"}
        for: 5m
        labels:
          severity: critical
          service: serving
        annotations:
          summary: "vLLM HPA is at max replicas"
          description: "vLLM HPA has been at max replicas for at least 5 minutes; GPU nodepool capacity or maxReplicas may be too low."
