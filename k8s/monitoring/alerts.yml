groups:
  - name: llm-serving-saturation
    rules:
      - alert: LLMRequestQueueSustained
        expr: avg by (namespace, pod) (llm_request_queue_size{namespace="llm-inference"}) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: vLLM request queue is sustained
          description: "Pod {{ $labels.pod }} has had more than 10 queued requests for at least 2 minutes."

      - alert: LLMGPUUtilizationHigh
        expr: avg by (namespace, pod) (llm_gpu_utilization_percent{namespace="llm-inference"}) > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: vLLM GPU utilization is high
          description: "Pod {{ $labels.pod }} GPU utilization has been above 90% for at least 5 minutes."

      - alert: LLMHPAReplicaLimitReached
        expr: kube_horizontalpodautoscaler_status_current_replicas{namespace="llm-inference", horizontalpodautoscaler="vllm-hpa"} >= kube_horizontalpodautoscaler_spec_max_replicas{namespace="llm-inference", horizontalpodautoscaler="vllm-hpa"}
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: vLLM HPA is at max replicas
          description: "vLLM HPA has been at max replicas for at least 5 minutes; GPU nodepool capacity or maxReplicas may be too low."

      - alert: LLMInferenceErrorsHigh
        expr: |
          sum(rate(llm_requests_total{namespace="llm-inference", status="error"}[5m]))
          /
          clamp_min(sum(rate(llm_requests_total{namespace="llm-inference"}[5m])), 1)
          > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: vLLM error rate is high
          description: "More than 5% of vLLM requests have failed over the last 5 minutes."
