rules:
  default: false
  custom:
    - seriesQuery: 'llm_request_queue_size{namespace!="",pod!=""}'
      resources:
        overrides:
          namespace:
            resource: namespace
          pod:
            resource: pod
      name:
        matches: '^llm_request_queue_size$'
        as: 'llm_request_queue_size'
      metricsQuery: 'avg_over_time(<<.Series>>{<<.LabelMatchers>>}[1m])'

    - seriesQuery: 'llm_gpu_utilization_percent{namespace!="",pod!=""}'
      resources:
        overrides:
          namespace:
            resource: namespace
          pod:
            resource: pod
      name:
        matches: '^llm_gpu_utilization_percent$'
        as: 'llm_gpu_utilization_percent'
      metricsQuery: 'avg(avg_over_time(<<.Series>>{<<.LabelMatchers>>}[1m])) by (<<.GroupBy>>)'

prometheus:
  url: http://prometheus-operated.monitoring.svc
  port: 9090

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
