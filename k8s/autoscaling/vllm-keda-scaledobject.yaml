# Optional queue/GPU autoscaling for the vLLM deployment.
#
# Requires KEDA and a reachable Prometheus service. Do not apply this together
# with another HPA targeting the same Deployment unless the HPA is removed or
# transferred to KEDA ownership.

apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: vllm-prometheus-autoscaler
  namespace: llm-inference
  labels:
    app: vllm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vllm-server
  pollingInterval: 15
  cooldownPeriod: 300
  minReplicaCount: 2
  maxReplicaCount: 10
  fallback:
    failureThreshold: 3
    replicas: 2
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 60
          policies:
            - type: Percent
              value: 100
              periodSeconds: 30
            - type: Pods
              value: 2
              periodSeconds: 30
          selectPolicy: Max
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Percent
              value: 50
              periodSeconds: 60
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
        metricName: llm_request_queue_depth
        query: sum(llm_request_queue_size{namespace="llm-inference"})
        threshold: "5"
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
        metricName: llm_gpu_utilization_percent
        query: avg(llm_gpu_utilization_percent{namespace="llm-inference"})
        threshold: "75"
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
        metricName: llm_active_requests_per_pod
        query: |
          sum(llm_active_requests{namespace="llm-inference"})
          /
          clamp_min(count(kube_pod_status_ready{namespace="llm-inference",condition="true"}), 1)
        threshold: "8"
