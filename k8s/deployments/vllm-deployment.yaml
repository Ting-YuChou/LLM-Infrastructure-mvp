# Kubernetes Deployment for vLLM Inference Server
# Production-ready configuration with autoscaling and monitoring

apiVersion: v1
kind: Namespace
metadata:
  name: llm-inference
  labels:
    app: llm-infrastructure
    
---

# ============================================================================
# ConfigMap for vLLM Configuration
# ============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-config
  namespace: llm-inference
data:
  MODEL_NAME: "meta-llama/Llama-2-7b-hf"
  TENSOR_PARALLEL_SIZE: "1"
  GPU_MEMORY_UTILIZATION: "0.90"
  MAX_NUM_SEQS: "256"
  MAX_NUM_BATCHED_TOKENS: "8192"
  ENABLE_PREFIX_CACHING: "true"
  LOG_LEVEL: "INFO"

---

# ============================================================================
# vLLM Deployment
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-server
  namespace: llm-inference
  labels:
    app: vllm
    version: v1
spec:
  replicas: 2  # Start with 2 replicas
  selector:
    matchLabels:
      app: vllm
      version: v1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero-downtime deployment
  template:
    metadata:
      labels:
        app: vllm
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      # Node selection
      nodeSelector:
        nvidia.com/gpu: "true"  # Only schedule on GPU nodes
      
      # Tolerations for GPU taints
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      
      # Container specifications
      containers:
      - name: vllm
        image: llm-serving:latest
        imagePullPolicy: IfNotPresent
        
        # Environment variables
        envFrom:
        - configMapRef:
            name: vllm-config
        env:
        - name: CUDA_VISIBLE_DEVICES
          value: "0"
        - name: PYTHONUNBUFFERED
          value: "1"
        
        # Ports
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        
        # Resource requests and limits
        resources:
          requests:
            memory: "16Gi"
            cpu: "4"
            nvidia.com/gpu: "1"
          limits:
            memory: "32Gi"
            cpu: "8"
            nvidia.com/gpu: "1"
        
        # Liveness probe (restart if unhealthy)
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        
        # Readiness probe (remove from service if not ready)
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Startup probe (for slow-starting containers)
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 12  # 120 seconds total
        
        # Volume mounts
        volumeMounts:
        - name: model-cache
          mountPath: /workspace/models
          readOnly: true
        - name: logs
          mountPath: /workspace/outputs/logs
      
      # Volumes
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-pvc
      - name: logs
        emptyDir: {}
      
      # Init container (download model if needed)
      initContainers:
      - name: model-downloader
        image: llm-base:latest
        command:
        - /bin/bash
        - -c
        - |
          if [ ! -d "/workspace/models/${MODEL_NAME}" ]; then
            echo "Downloading model..."
            python -c "from transformers import AutoModel; AutoModel.from_pretrained('${MODEL_NAME}', cache_dir='/workspace/models')"
          else
            echo "Model already cached"
          fi
        volumeMounts:
        - name: model-cache
          mountPath: /workspace/models

---

# ============================================================================
# Service (Load Balancer)
# ============================================================================

apiVersion: v1
kind: Service
metadata:
  name: vllm-service
  namespace: llm-inference
  labels:
    app: vllm
spec:
  type: LoadBalancer
  selector:
    app: vllm
    version: v1
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  sessionAffinity: ClientIP  # Sticky sessions
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600

---

# ============================================================================
# Headless Service (for StatefulSet if needed)
# ============================================================================

apiVersion: v1
kind: Service
metadata:
  name: vllm-headless
  namespace: llm-inference
  labels:
    app: vllm
spec:
  clusterIP: None
  selector:
    app: vllm
  ports:
  - name: http
    port: 8000
    targetPort: 8000

---

# ============================================================================
# Horizontal Pod Autoscaler (HPA)
# ============================================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vllm-hpa
  namespace: llm-inference
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vllm-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
  # CPU-based scaling
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  
  # Memory-based scaling
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 minutes before scaling down
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60  # Wait 1 minute before scaling up
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max

---

# ============================================================================
# PersistentVolumeClaim for Model Storage
# ============================================================================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-pvc
  namespace: llm-inference
spec:
  accessModes:
  - ReadWriteMany  # Multiple pods can read
  resources:
    requests:
      storage: 100Gi  # Adjust based on model size
  storageClassName: fast-ssd  # Use fast storage for models

---

# ============================================================================
# PodDisruptionBudget (ensure availability during updates)
# ============================================================================

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vllm-pdb
  namespace: llm-inference
spec:
  minAvailable: 1  # Always keep at least 1 pod running
  selector:
    matchLabels:
      app: vllm

---

# ============================================================================
# NetworkPolicy (optional: restrict traffic)
# ============================================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vllm-network-policy
  namespace: llm-inference
spec:
  podSelector:
    matchLabels:
      app: vllm
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: llm-inference
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443  # HTTPS
    - protocol: TCP
      port: 80   # HTTP

---

# ============================================================================
# ServiceMonitor (for Prometheus)
# ============================================================================

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vllm-metrics
  namespace: llm-inference
  labels:
    app: vllm
spec:
  selector:
    matchLabels:
      app: vllm
  endpoints:
  - port: http
    interval: 30s
    path: /metrics

---

# ============================================================================
# Usage Instructions:
#
# Apply all configurations:
#   kubectl apply -f k8s/deployments/vllm-deployment.yaml
#
# Check deployment status:
#   kubectl get pods -n llm-inference
#   kubectl get svc -n llm-inference
#
# View logs:
#   kubectl logs -n llm-inference -l app=vllm -f
#
# Scale manually:
#   kubectl scale deployment vllm-server -n llm-inference --replicas=5
#
# Port forward for local access:
#   kubectl port-forward -n llm-inference svc/vllm-service 8000:80
#
# Delete all resources:
#   kubectl delete namespace llm-inference
# ============================================================================
