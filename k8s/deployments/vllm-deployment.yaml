# Kubernetes Deployment for vLLM Inference Server
# Production-ready configuration with autoscaling and monitoring

apiVersion: v1
kind: Namespace
metadata:
  name: llm-inference
  labels:
    app: llm-infrastructure
    name: llm-inference
    
---

# ============================================================================
# ConfigMap for vLLM Configuration
# ============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-config
  namespace: llm-inference
data:
  MODEL_NAME: "/workspace/models/awq/checkpoint-final"
  QUANTIZATION: "awq"
  DTYPE: "float16"
  # Default mode is 1 GPU per pod with horizontal autoscaling.
  # For tensor-parallel serving, set TENSOR_PARALLEL_SIZE and the GPU
  # request/limit below to the same value, then ensure nodes have enough GPUs.
  TENSOR_PARALLEL_SIZE: "1"
  PIPELINE_PARALLEL_SIZE: "1"
  GPU_MEMORY_UTILIZATION: "0.90"
  MAX_NUM_SEQS: "256"
  MAX_NUM_BATCHED_TOKENS: "8192"
  MAX_CONCURRENT_REQUESTS: "512"
  ENABLE_PREFIX_CACHING: "true"
  ENABLE_METRICS: "true"
  METRICS_PORT: "9090"
  GPU_METRICS_INTERVAL: "15"
  LOG_LEVEL: "INFO"

---

# ============================================================================
# vLLM Deployment
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-server
  namespace: llm-inference
  labels:
    app: vllm
    version: v1
spec:
  replicas: 3  # Warm pool for faster spike absorption
  selector:
    matchLabels:
      app: vllm
      version: v1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero-downtime deployment
  template:
    metadata:
      labels:
        app: vllm
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 120
      # Node selection
      nodeSelector:
        nvidia.com/gpu.present: "true"  # Customize to match your GPU node labels
      
      # Tolerations for GPU taints
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule

      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: vllm
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: vllm
              topologyKey: kubernetes.io/hostname
      
      # Container specifications
      containers:
      - name: vllm
        image: llm-serving:latest
        imagePullPolicy: IfNotPresent
        
        # Environment variables
        envFrom:
        - configMapRef:
            name: vllm-config
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        
        # Ports
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        
        # Resource requests and limits
        resources:
          requests:
            memory: "16Gi"
            cpu: "4"
            # For N-GPU tensor parallel serving, set this equal to
            # TENSOR_PARALLEL_SIZE and schedule on nodes with >= N GPUs.
            nvidia.com/gpu: "1"
          limits:
            memory: "32Gi"
            cpu: "8"
            nvidia.com/gpu: "1"

        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 20"]
        
        # Liveness probe (restart if unhealthy)
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        
        # Readiness probe (remove from service if not ready)
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Startup probe (for slow-starting containers)
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 12  # 120 seconds total
        
        # Volume mounts
        volumeMounts:
        - name: model-cache
          mountPath: /workspace/models
          readOnly: true
        - name: logs
          mountPath: /workspace/outputs/logs
      
      # Volumes
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-pvc
      - name: logs
        emptyDir: {}
      
      # Init container (download model if needed)
      initContainers:
      - name: model-downloader
        image: llm-base:latest
        command:
        - /bin/bash
        - -c
        - |
          python - <<'PY'
          import os
          from huggingface_hub import snapshot_download

          model_name = os.environ["MODEL_NAME"]

          if os.path.isabs(model_name):
              if not os.path.isdir(model_name):
                  raise SystemExit(f"Local model path does not exist: {model_name}")
              print(f"Using local model path: {model_name}")
          else:
              print(f"Downloading model snapshot: {model_name}")
              snapshot_download(repo_id=model_name, cache_dir="/workspace/models")
          PY
        volumeMounts:
        - name: model-cache
          mountPath: /workspace/models

---

# ============================================================================
# Service (Load Balancer)
# ============================================================================

apiVersion: v1
kind: Service
metadata:
  name: vllm-service
  namespace: llm-inference
  labels:
    app: vllm
spec:
  type: LoadBalancer
  selector:
    app: vllm
    version: v1
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  sessionAffinity: None

---

# ============================================================================
# Headless Service (for StatefulSet if needed)
# ============================================================================

apiVersion: v1
kind: Service
metadata:
  name: vllm-headless
  namespace: llm-inference
  labels:
    app: vllm
spec:
  clusterIP: None
  selector:
    app: vllm
  ports:
  - name: http
    port: 8000
    targetPort: 8000

---

# ============================================================================
# Horizontal Pod Autoscaler (HPA)
# ============================================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vllm-hpa
  namespace: llm-inference
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vllm-server
  minReplicas: 3
  maxReplicas: 30
  metrics:
  # CPU-based scaling
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
  
  # Memory-based scaling
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85
  
  # Custom metric: GPU utilization
  - type: Pods
    pods:
      metric:
        name: llm_gpu_utilization_percent
      target:
        type: AverageValue
        averageValue: "75"
  
  # Custom metric: Request queue size
  - type: Pods
    pods:
      metric:
        name: llm_request_queue_size
      target:
        type: AverageValue
        averageValue: "4"
  
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600  # Keep warm capacity after spikes
      policies:
      - type: Percent
        value: 25
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0  # React immediately to queue growth
      policies:
      - type: Percent
        value: 200
        periodSeconds: 15
      - type: Pods
        value: 10
        periodSeconds: 15
      selectPolicy: Max

---

# ============================================================================
# PersistentVolumeClaim for Model Storage
# ============================================================================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-pvc
  namespace: llm-inference
spec:
  accessModes:
  - ReadWriteMany  # Multiple pods can read
  resources:
    requests:
      storage: 100Gi  # Adjust based on model size
  storageClassName: fast-ssd  # Use fast storage for models

---

# ============================================================================
# PodDisruptionBudget (ensure availability during updates)
# ============================================================================

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vllm-pdb
  namespace: llm-inference
spec:
  minAvailable: 1  # Always keep at least 1 pod running
  selector:
    matchLabels:
      app: vllm

---

# ============================================================================
# NetworkPolicy (optional: restrict traffic)
# ============================================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vllm-network-policy
  namespace: llm-inference
spec:
  podSelector:
    matchLabels:
      app: vllm
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: llm-inference
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 9090
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443  # HTTPS
    - protocol: TCP
      port: 80   # HTTP

---

# ============================================================================
# ServiceMonitor (for Prometheus)
# ============================================================================

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vllm-metrics
  namespace: llm-inference
  labels:
    app: vllm
spec:
  selector:
    matchLabels:
      app: vllm
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics

---

# ============================================================================
# Usage Instructions:
#
# Apply all configurations:
#   kubectl apply -f k8s/deployments/vllm-deployment.yaml
#
# Check deployment status:
#   kubectl get pods -n llm-inference
#   kubectl get svc -n llm-inference
#
# View logs:
#   kubectl logs -n llm-inference -l app=vllm -f
#
# Scale manually:
#   kubectl scale deployment vllm-server -n llm-inference --replicas=5
#
# Port forward for local access:
#   kubectl port-forward -n llm-inference svc/vllm-service 8000:80
#
# Delete all resources:
#   kubectl delete namespace llm-inference
# ============================================================================
