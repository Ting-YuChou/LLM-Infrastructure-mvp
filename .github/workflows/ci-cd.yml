# GitHub Actions CI/CD Pipeline
# Automated testing, building, and deployment for LLM infrastructure

name: LLM Infrastructure CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================================================
  # Code Quality & Linting
  # ==========================================================================
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.host-check.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.host-check.txt
      
      - name: Run serving compile smoke
        run: |
          PYTHONPATH=src python -m py_compile \
            src/api/gateway.py \
            src/api/model_routing.py \
            src/monitoring/metrics.py \
            src/serving/mock_server.py \
            src/serving/vllm_server.py \
            scripts/compose_smoke_test.py \
            scripts/eval_gate.py

      - name: Validate serving configuration files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          import yaml

          json_paths = [
              Path("config/eval_gate.json"),
              Path("config/model_routing.gpu.json"),
              Path("config/model_routing.local.json"),
          ]
          yaml_paths = [
              *Path("config").glob("*.yaml"),
              *Path("docker").glob("*.yml"),
              *Path("k8s").glob("**/*.yml"),
              *Path("k8s").glob("**/*.yaml"),
              Path("docker-compose.yml"),
              Path("docker-compose.local.yml"),
              Path("docker-compose.gpu.yml"),
          ]

          for path in json_paths:
              with path.open("r", encoding="utf-8") as handle:
                  json.load(handle)

          for path in yaml_paths:
              with path.open("r", encoding="utf-8") as handle:
                  list(yaml.safe_load_all(handle))

          print("serving-config-parse-ok")
          PY

      - name: Check whitespace errors
        run: git diff --check HEAD^ HEAD

  # ==========================================================================
  # Unit Tests
  # ==========================================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.host-check.txt') }}
      
      - name: Run host checks
        run: |
          chmod +x scripts/run_host_checks.sh
          scripts/run_host_checks.sh

  # ==========================================================================
  # Docker Build
  # ==========================================================================
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    strategy:
      fail-fast: false
      matrix:
        image: [base, serving, gateway, mock-serving]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.image }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================================================
  # Security Scanning
  # ==========================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # ==========================================================================
  # Deploy to Staging
  # ==========================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.llm-infra.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}
      
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/deployments/vllm-deployment.yaml
          kubectl rollout status deployment/vllm-server -n llm-inference
      
      - name: Run smoke tests
        run: |
          kubectl wait --for=condition=available deployment/vllm-server -n llm-inference --timeout=300s
          curl -fsS https://staging.llm-infra.example.com/health

  # ==========================================================================
  # Deploy to Production
  # ==========================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://llm-infra.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_PROD }}
      
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/deployments/vllm-deployment.yaml
          kubectl rollout status deployment/vllm-server -n llm-inference
      
      - name: Run production tests
        run: |
          curl -fsS https://llm-infra.example.com/health
      
      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Production deployment completed'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()

  # ==========================================================================
  # Performance Benchmarking
  # ==========================================================================
  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/develop'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install httpx numpy tqdm
      
      - name: Run benchmark
        run: |
          python scripts/benchmark.py \
            --endpoint https://staging.llm-infra.example.com \
            --num-requests 100 \
            --concurrent 10 \
            --output benchmark-results.json
      
      - name: Upload benchmark results
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results
          path: benchmark-results.json
      
      - name: Comment PR with results
        uses: actions/github-script@v6
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('benchmark-results.json', 'utf8'));
            
            const comment = `
            ## 📊 Benchmark Results
            
            **Latency:**
            - P50: ${results.p50_latency.toFixed(3)}s
            - P95: ${results.p95_latency.toFixed(3)}s
            - P99: ${results.p99_latency.toFixed(3)}s
            
            **Throughput:**
            - Requests/sec: ${results.requests_per_second.toFixed(2)}
            - Tokens/sec: ${results.tokens_per_second.toFixed(2)}
            
            **Success Rate:** ${results.success_rate.toFixed(1)}%
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # ==========================================================================
  # Cleanup
  # ==========================================================================
  cleanup:
    name: Cleanup Old Artifacts
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 30
          keep_minimum_runs: 10
