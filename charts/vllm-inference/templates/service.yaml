apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.resourceNames.service }}
  namespace: {{ include "vllm-inference.namespace" . }}
  labels:
{{ include "vllm-inference.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
{{ include "vllm-inference.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
{{- if .Values.service.sessionAffinity }}
  sessionAffinity: {{ .Values.service.sessionAffinity }}
{{- end }}
{{- with .Values.service.sessionAffinityConfig }}
  sessionAffinityConfig:
{{ toYaml . | nindent 4 }}
{{- end }}
{{- if .Values.headlessService.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.resourceNames.headlessService }}
  namespace: {{ include "vllm-inference.namespace" . }}
  labels:
{{ include "vllm-inference.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app: {{ .Values.selectorLabels.app }}
  ports:
    - name: http
      port: {{ .Values.headlessService.port }}
      targetPort: {{ .Values.headlessService.targetPort }}
{{- end }}
