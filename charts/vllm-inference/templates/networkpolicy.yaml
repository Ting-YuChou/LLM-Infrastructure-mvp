{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.resourceNames.networkPolicy }}
  namespace: {{ include "vllm-inference.namespace" . }}
  labels:
{{ include "vllm-inference.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Values.selectorLabels.app }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
{{- if .Values.networkPolicy.allowSameNamespace }}
        - podSelector: {}
{{- end }}
        - namespaceSelector:
            matchLabels:
{{ toYaml .Values.networkPolicy.monitoringNamespaceLabel | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
  egress:
    - to:
        - namespaceSelector: {}
      ports:
{{ toYaml .Values.networkPolicy.egressPorts | nindent 8 }}
{{- end }}
