{{- if .Values.keda.enabled }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ .Values.resourceNames.kedaScaledObject }}
  namespace: {{ include "vllm-inference.namespace" . }}
  labels:
{{ include "vllm-inference.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.resourceNames.deployment }}
  pollingInterval: {{ .Values.keda.pollingInterval }}
  cooldownPeriod: {{ .Values.keda.cooldownPeriod }}
  minReplicaCount: {{ .Values.keda.minReplicaCount }}
  maxReplicaCount: {{ .Values.keda.maxReplicaCount }}
{{- with .Values.keda.fallback }}
  fallback:
{{ toYaml . | nindent 4 }}
{{- end }}
{{- with .Values.keda.advanced }}
  advanced:
{{ toYaml . | nindent 4 }}
{{- end }}
  triggers:
{{ toYaml .Values.keda.triggers | nindent 4 }}
{{- end }}
